<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Escolher Música</title>
</head>
<body>

<h1>Escolha a música 🎵</h1>

<select id="musica">
  <option value="./img/musica_fundo1.wav">Música 1</option>
  <option value="./img/musica_fundo2.mp3">Música 2</option>
</select>

<br><br>

<button id="salvar">Salvar</button>

<script>
let audioPreview = new Audio()

// tocar música ao mudar
document.getElementById('musica').addEventListener('change', (e) => {
    let musica = e.target.value

    audioPreview.pause() // para a anterior
    audioPreview = new Audio(musica)
    audioPreview.volume = 0.5
    audioPreview.play()
})

// salvar escolha
document.getElementById('salvar').addEventListener('click', () => {
    let musica = document.getElementById('musica').value
    localStorage.setItem('musica', musica)

    alert('Música salva!')
})
</script>

</body>
</html>
